<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人员管理</title>
  <script src="/js/api-client.js?v=1.0.97"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --panel: #162235;
      --panel-2: #1f3048;
      --line: #30455f;
      --text: #f4f8ff;
      --muted: #9fb1c7;
      --blue: #4f8cff;
      --green: #26c281;
      --orange: #f59e0b;
      --red: #ef6461;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 28px;
      background: #132137;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    main { max-width: 1480px; margin: 0 auto; padding: 24px; }
    a { color: #a9c7ff; text-decoration: none; }
    button, input, select, textarea {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #23344d;
      color: var(--text);
      padding: 8px 12px;
      font: inherit;
    }
    textarea { width: 100%; min-height: 64px; resize: vertical; line-height: 1.6; }
    button { cursor: pointer; }
    button.primary { background: var(--blue); border-color: var(--blue); font-weight: 700; }
    button.secondary { background: #20314a; }
    .title { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .page-title { font-size: 18px; font-weight: 700; }
    .version { color: var(--green); border: 1px solid rgba(38,194,129,.3); border-radius: 999px; padding: 2px 8px; font-size: 12px; }
    .header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .user-pill { color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { border-color: var(--line); color: var(--muted); }
    .tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    .calculator { display: grid; gap: 16px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .panel-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
    .form-grid { display: grid; grid-template-columns: repeat(4, minmax(160px, 1fr)); gap: 12px; }
    .field label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .field input, .field select { width: 100%; }
    .wide { grid-column: 1 / -1; }
    .segmented { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .segmented button.active { background: rgba(79,140,255,.24); border-color: var(--blue); color: #fff; }
    .rate-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .rate-chip {
      background: #20314a;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      min-height: 58px;
    }
    .rate-chip span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .rate-chip input { width: 100%; min-height: 30px; padding: 5px 6px; }
    .toolbar { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
    .toolbar-note { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .table-section { display: grid; gap: 14px; }
    .table-wrap { width: 100%; overflow: auto; border: 1px solid var(--line); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: right; white-space: nowrap; }
    th { color: #c7d7ee; background: #20314a; font-weight: 700; position: sticky; top: 0; }
    th:first-child, td:first-child { text-align: left; }
    tr:last-child td { border-bottom: 0; }
    .muted { color: var(--muted); }
    .section-note {
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.7;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }
    .hidden { display: none !important; }
    .access-denied {
      max-width: 680px;
      margin: 80px auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
    }
    .access-denied strong { display: block; font-size: 18px; margin-bottom: 10px; }
    @media (max-width: 980px) {
      header { align-items: flex-start; flex-direction: column; padding: 12px 16px; }
      main { padding: 16px; }
      .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .rate-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      button, input, select { width: 100%; }
      .header-actions, .tabs, .toolbar { width: 100%; }
      .form-grid, .segmented, .rate-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title">
      <span class="page-title">人员管理</span>
      <span class="version">v1.0.97</span>
    </div>
    <div class="header-actions">
      <span class="user-pill" id="currentUserName">未登录</span>
      <a href="/">返回经营看板</a>
    </div>
  </header>

  <main id="pageMain">
    <div class="tabs" role="tablist">
      <button class="tab active" data-calculator="oto" type="button">OTO 基本法测算</button>
      <button class="tab" data-calculator="zhengbao" type="button">证保基本法测算</button>
    </div>

    <section class="calculator" id="otoCalculator">
      <div class="panel">
        <div class="toolbar">
          <div class="panel-title">OTO 参数设置</div>
          <button class="secondary" type="button" data-export="oto">导出当前测算</button>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="otoTerm">缴期</label>
            <select id="otoTerm">
              <option>趸交</option>
              <option>3年</option>
              <option>5年</option>
              <option>6年</option>
              <option selected>10年</option>
            </select>
          </div>
          <div class="field">
            <label for="otoInst">机构类型</label>
            <select id="otoInst">
              <option>A类</option>
              <option>B类</option>
            </select>
          </div>
          <div class="field">
            <label for="otoCoeff">产品系数</label>
            <input id="otoCoeff" type="number" min="0" step="0.01" value="1">
          </div>
          <div class="field">
            <label for="otoTeamSize">团队人数</label>
            <input id="otoTeamSize" type="number" min="1" step="1" value="4">
          </div>
          <div class="field">
            <label for="otoUmSize">UM 团队人数</label>
            <input id="otoUmSize" type="number" min="1" step="1" value="20">
          </div>
          <div class="field wide">
            <label for="otoScenarios">产能档位（万元/人/月，逗号或空格分隔）</label>
            <textarea id="otoScenarios">1, 5, 10, 20, 30, 50</textarea>
          </div>
        </div>
        <div class="section-note">口径：NFYP = 人产 × 10000 × 缴期折算 × 产品系数；团队和 UM 相关利益按设置人数分摊，默认沿用原模块 4 人团队、20 人 UM 团队。</div>
      </div>

      <div class="table-section">
        <div class="panel">
          <div class="panel-title">整体基本法成本</div>
          <div class="table-wrap"><table id="otoOverallTable"></table></div>
        </div>
        <div class="panel">
          <div class="panel-title">专员成本明细</div>
          <div class="table-wrap"><table id="otoSpecialistTable"></table></div>
        </div>
        <div class="panel">
          <div class="panel-title">管理职成本明细</div>
          <div class="table-wrap"><table id="otoManagementTable"></table></div>
        </div>
      </div>
    </section>

    <section class="calculator hidden" id="zhengbaoCalculator">
      <div class="panel">
        <div class="toolbar">
          <div class="panel-title">证保参数设置</div>
          <button class="secondary" type="button" data-export="zhengbao">导出当前测算</button>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="zbTerm">缴期</label>
            <select id="zbTerm">
              <option>趸交</option>
              <option>3年</option>
              <option>5年</option>
              <option>6年</option>
              <option selected>10年</option>
            </select>
          </div>
          <div class="field">
            <label>费用版本</label>
            <div class="segmented">
              <button type="button" class="active" data-zb-type="standard">标准</button>
              <button type="button" data-zb-type="favorable">费优</button>
              <button type="button" data-zb-type="other">其他</button>
            </div>
          </div>
          <div class="field">
            <label for="zbTeamSize">团队人数</label>
            <input id="zbTeamSize" type="number" min="1" step="1" value="4">
          </div>
          <div class="field wide" id="zbRateDisplay"></div>
          <div class="field wide hidden" id="zbCustomRates">
            <label>自定义 FYC 率（%）</label>
            <div class="rate-grid">
              <div class="rate-chip"><span>趸交</span><input data-term-rate="趸交" type="number" min="0" step="0.01"></div>
              <div class="rate-chip"><span>3年</span><input data-term-rate="3年" type="number" min="0" step="0.01"></div>
              <div class="rate-chip"><span>5年</span><input data-term-rate="5年" type="number" min="0" step="0.01"></div>
              <div class="rate-chip"><span>6年</span><input data-term-rate="6年" type="number" min="0" step="0.01"></div>
              <div class="rate-chip"><span>10年</span><input data-term-rate="10年" type="number" min="0" step="0.01"></div>
            </div>
          </div>
          <div class="field wide">
            <label for="zbScenarios">产能档位（万元/人/月，逗号或空格分隔）</label>
            <textarea id="zbScenarios">1, 5, 10, 20, 30, 50</textarea>
          </div>
        </div>
        <div class="section-note">口径：FYC = 人产 × 10000 × FYC 率；标准和费优使用内置缴期费率，其他版本按当前缴期自定义费率测算。</div>
      </div>

      <div class="table-section">
        <div class="panel">
          <div class="panel-title">整体基本法成本</div>
          <div class="table-wrap"><table id="zbOverallTable"></table></div>
        </div>
        <div class="panel">
          <div class="panel-title">专员成本明细</div>
          <div class="table-wrap"><table id="zbSpecialistTable"></table></div>
        </div>
        <div class="panel">
          <div class="panel-title">管理职成本明细</div>
          <div class="table-wrap"><table id="zbManagementTable"></table></div>
        </div>
      </div>
    </section>
  </main>

  <div class="access-denied hidden" id="accessDenied">
    <strong>当前账号暂无人员管理权限</strong>
    <div>该页面默认仅对管理员组开放，可由管理员在权限管理中单独授权。</div>
    <p><a href="/">返回经营看板</a></p>
  </div>

  <script src="/js/personnel-management.js?v=1.0.97"></script>
</body>
</html>
