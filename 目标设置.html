<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经营分析 - 目标设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background: #0f172a; color: #e2e8f0; padding: 24px;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #334155;
    }
    .header h1 { font-size: 20px; font-weight: 600; color: #f8fafc; }
    .header-actions { display: flex; gap: 10px; }
    .btn {
      padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .btn-success { background: #10b981; color: #fff; }
    .btn-success:hover { background: #059669; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .toolbar {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
      padding: 12px 16px; background: #1e293b; border-radius: 8px;
    }
    .toolbar label { font-size: 13px; color: #94a3b8; }
    .toolbar select {
      padding: 6px 10px; border-radius: 4px; border: 1px solid #334155;
      background: #0f172a; color: #e2e8f0; font-size: 13px;
    }
    .toolbar .status { margin-left: auto; font-size: 12px; color: #64748b; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 16px; }

    .card {
      background: #1e293b; border-radius: 10px; border: 1px solid #334155;
      overflow: hidden;
    }
    .card-header {
      padding: 12px 16px; background: #1e293b;
      border-bottom: 1px solid #334155; font-weight: 600; font-size: 14px;
      color: #f8fafc; display: flex; align-items: center; gap: 8px;
    }
    .card-header .icon { width: 8px; height: 8px; border-radius: 50%; }
    .card-body { padding: 12px 16px; }

    .section-title {
      font-size: 12px; color: #94a3b8; text-transform: uppercase;
      letter-spacing: 0.5px; margin: 12px 0 8px;
    }
    .section-title:first-child { margin-top: 0; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #334155; }
    th { color: #94a3b8; font-weight: 500; font-size: 12px; background: #1e293b; }
    td { color: #e2e8f0; }
    tr:hover td { background: #334155; }
    tr.sub td:first-child { padding-left: 24px; color: #94a3b8; }

    input.target-input {
      width: 90px; padding: 5px 8px; border-radius: 4px;
      border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
      font-size: 13px; text-align: right;
    }
    input.target-input:focus {
      outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }
    input.target-input-sm {
      width: 58px; padding: 3px 4px; font-size: 11px;
    }

    .toast {
      position: fixed; top: 20px; right: 20px; padding: 12px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      transform: translateX(150%); transition: transform 0.3s ease;
      z-index: 1000;
    }
    .toast.show { transform: translateX(0); }
    .toast-success { background: #10b981; color: #fff; }
    .toast-error { background: #ef4444; color: #fff; }

    #fileInput { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>经营目标设置</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="exportJSON()">导出 JSON</button>
      <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">导入 JSON</button>
      <input type="file" id="fileInput" accept=".json" onchange="importJSON(this)">
      <button class="btn btn-success" id="saveBtn" onclick="saveToServer()">保存到服务器</button>
    </div>
  </div>

  <div class="toolbar">
    <label>目标年份</label>
    <select id="yearSelect" onchange="changeYear(this.value)">
      <option value="2026" selected>2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
    </select>
    <span style="color:#64748b;font-size:12px;">所有目标值单位：万 · 数据保存到服务器后所有人可见</span>
    <span class="status" id="statusText"></span>
  </div>

  <div class="grid" id="formGrid"></div>

  <div class="toast" id="toast"></div>

  <script>
    // 如需手动指定后端地址，取消下面一行的注释并修改：
    // const BACKEND_URL = 'http://your-server-ip:8000';
    const API_BASE = typeof BACKEND_URL !== 'undefined' ? BACKEND_URL
      : (window.location.protocol === 'file:' ? 'http://localhost:8000' : '');

    const METRICS = ['整体', '经代', '转型业务', 'OTO', '证保', '蚁桥'];

    function createDefaultData(year) {
      const categories = [
        { key: 'qjPremium', name: '期交保费', color: '#3b82f6',
          yearTargets: [10500,4800,5700,2500,2200,1000] },
        { key: 'value', name: '价值保费', color: '#8b5cf6',
          yearTargets: [8200,3600,4600,2000,1800,800] },
        { key: 'shangbao', name: '商保年金', color: '#10b981',
          yearTargets: [3500,1500,2000,900,700,400] },
        { key: 'baozhang', name: '保障类产品', color: '#f59e0b',
          yearTargets: [4200,1800,2400,1000,900,500] },
        { key: 'tenYear', name: '10年期产品', color: '#ef4444',
          yearTargets: [2800,1200,1600,700,600,300] }
      ];
      const qFactors = [0.22, 0.25, 0.26, 0.27];
      const mFactors = [0.07,0.07,0.08,0.08,0.09,0.09,0.08,0.08,0.09,0.09,0.09,0.09];
      const data = { year: parseInt(year), categories: {} };
      categories.forEach(cat => {
        data.categories[cat.key] = { name: cat.name, color: cat.color, metrics: {} };
        METRICS.forEach((m, i) => {
          const yearVal = cat.yearTargets[i];
          data.categories[cat.key].metrics[m] = {
            year: yearVal,
            quarter: qFactors.map(f => Math.round(yearVal * f)),
            month: mFactors.map(f => Math.round(yearVal * f))
          };
        });
      });
      return data;
    }

    function normalizeData(data, year) {
      const base = createDefaultData(year || data?.year || 2026);
      if (!data || !data.categories) return base;
      const result = { year: parseInt(year || data.year || 2026), categories: {} };
      Object.keys(base.categories).forEach(catKey => {
        result.categories[catKey] = {
          name: data.categories[catKey]?.name || base.categories[catKey].name,
          color: data.categories[catKey]?.color || base.categories[catKey].color,
          metrics: {}
        };
        METRICS.forEach(m => {
          const src = data.categories[catKey]?.metrics?.[m];
          result.categories[catKey].metrics[m] = {
            year: src?.year ?? base.categories[catKey].metrics[m].year,
            quarter: Array.isArray(src?.quarter) && src.quarter.length === 4
              ? src.quarter : base.categories[catKey].metrics[m].quarter,
            month: Array.isArray(src?.month) && src.month.length === 12
              ? src.month : base.categories[catKey].metrics[m].month
          };
        });
      });
      return result;
    }

    let currentData = null;

    async function loadFromServer(year) {
      const desiredYear = parseInt(year || currentData?.year || 2026);
      setStatus('正在从服务器加载...');
      try {
        const resp = await fetch(`${API_BASE}/api/targets/${desiredYear}`, { method: 'GET' });
        if (!resp.ok) throw new Error('Server unavailable');
        const data = await resp.json();
        currentData = normalizeData(data && data.categories ? data : createDefaultData(desiredYear), desiredYear);
        setStatus('已从服务器同步');
      } catch (e) {
        currentData = createDefaultData(desiredYear);
        setStatus('服务器不可用，使用默认数据');
      }
      document.getElementById('yearSelect').value = currentData.year;
      renderForm();
    }

    function changeYear(year) {
      loadFromServer(parseInt(year));
    }

    function renderForm() {
      const grid = document.getElementById('formGrid');
      grid.innerHTML = '';
      Object.entries(currentData.categories).forEach(([catKey, cat]) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-header">
            <span class="icon" style="background:${cat.color}"></span>
            ${cat.name}目标
          </div>
          <div class="card-body">${renderCategoryTable(catKey, cat)}</div>
        `;
        grid.appendChild(card);
      });
    }

    function renderCategoryTable(catKey, cat) {
      // 年度目标
      let html = `
        <div class="section-title">年度目标</div>
        <table>
          <thead><tr><th style="width:40%">口径</th><th>目标值（万）</th></tr></thead>
          <tbody>
            ${METRICS.map(m => `
              <tr class="${m === 'OTO' || m === '证保' || m === '蚁桥' ? 'sub' : ''}">
                <td>${m}</td>
                <td><input type="number" class="target-input"
                  value="${cat.metrics[m]?.year ?? 0}"
                  data-cat="${catKey}" data-metric="${m}" data-dim="year"
                  onchange="updateValue(this)"></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      // 季度目标
      html += `
        <div class="section-title">季度目标</div>
        <table>
          <thead><tr><th>口径</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th></tr></thead>
          <tbody>
            ${METRICS.map(m => `
              <tr class="${m === 'OTO' || m === '证保' || m === '蚁桥' ? 'sub' : ''}">
                <td>${m}</td>
                ${[0,1,2,3].map(q => `
                  <td><input type="number" class="target-input target-input-sm"
                    value="${cat.metrics[m]?.quarter?.[q] ?? 0}"
                    data-cat="${catKey}" data-metric="${m}" data-dim="quarter" data-idx="${q}"
                    onchange="updateValue(this)"></td>
                `).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      // 月度目标（上半年）
      html += `
        <div class="section-title">月度目标（1-6月）</div>
        <table>
          <thead><tr><th>口径</th>${[1,2,3,4,5,6].map(mo => `<th>${mo}月</th>`).join('')}</tr></thead>
          <tbody>
            ${METRICS.map(m => `
              <tr class="${m === 'OTO' || m === '证保' || m === '蚁桥' ? 'sub' : ''}">
                <td>${m}</td>
                ${[0,1,2,3,4,5].map(mi => `
                  <td><input type="number" class="target-input target-input-sm"
                    value="${cat.metrics[m]?.month?.[mi] ?? 0}"
                    data-cat="${catKey}" data-metric="${m}" data-dim="month" data-idx="${mi}"
                    onchange="updateValue(this)"></td>
                `).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      // 月度目标（下半年）
      html += `
        <div class="section-title">月度目标（7-12月）</div>
        <table>
          <thead><tr><th>口径</th>${[7,8,9,10,11,12].map(mo => `<th>${mo}月</th>`).join('')}</tr></thead>
          <tbody>
            ${METRICS.map(m => `
              <tr class="${m === 'OTO' || m === '证保' || m === '蚁桥' ? 'sub' : ''}">
                <td>${m}</td>
                ${[6,7,8,9,10,11].map(mi => `
                  <td><input type="number" class="target-input target-input-sm"
                    value="${cat.metrics[m]?.month?.[mi] ?? 0}"
                    data-cat="${catKey}" data-metric="${m}" data-dim="month" data-idx="${mi}"
                    onchange="updateValue(this)"></td>
                `).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      return html;
    }

    function updateValue(input) {
      const cat = input.dataset.cat;
      const metric = input.dataset.metric;
      const dim = input.dataset.dim;
      const val = parseFloat(input.value) || 0;
      if (!currentData.categories[cat].metrics[metric]) {
        currentData.categories[cat].metrics[metric] = { year: 0, quarter: [0,0,0,0], month: Array(12).fill(0) };
      }
      if (dim === 'year') {
        currentData.categories[cat].metrics[metric].year = val;
      } else {
        const idx = parseInt(input.dataset.idx);
        const arr = currentData.categories[cat].metrics[metric][dim];
        if (Array.isArray(arr) && idx >= 0 && idx < arr.length) {
          arr[idx] = val;
        }
      }
    }

    async function saveToServer() {
      const btn = document.getElementById('saveBtn');
      const original = btn.textContent;
      btn.textContent = '保存中...';
      btn.disabled = true;
      try {
        currentData = normalizeData(currentData, currentData?.year || 2026);
        const resp = await fetch(`${API_BASE}/api/targets/${currentData.year}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentData)
        });
        if (!resp.ok) throw new Error('保存失败');
        currentData = normalizeData(await resp.json(), currentData.year);
        showToast('目标数据已保存到服务器', 'success');
        setStatus('已保存到服务器');
      } catch (e) {
        showToast('保存失败: ' + e.message, 'error');
        setStatus('保存失败');
      } finally {
        btn.textContent = original;
        btn.disabled = false;
      }
    }

    function exportJSON() {
      const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `经营目标_${currentData.year}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('JSON 文件已导出', 'success');
    }

    async function importJSON(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (data.year && data.categories) {
            currentData = normalizeData(data, data.year);
            document.getElementById('yearSelect').value = currentData.year;
            renderForm();
            showToast('JSON 导入成功，请保存到服务器', 'success');
            setStatus('数据已导入，未保存到服务器');
          } else {
            showToast('文件格式不正确', 'error');
          }
        } catch(err) {
          showToast('JSON 解析失败', 'error');
        }
      };
      reader.readAsText(file);
      input.value = '';
    }

    function setStatus(msg) {
      document.getElementById('statusText').textContent = msg;
    }

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast toast-${type} show`;
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // 初始化
    loadFromServer(2026);
  </script>
</body>
</html>
