# 可选覆盖文件：增加内置 nginx 反向代理
# 使用方式：docker compose -f docker-compose.yml -f docker-compose.nginx.yml up -d
services:
  nginx:
    image: nginx:alpine
    container_name: business-analysis-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
