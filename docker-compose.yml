services:
  app:
    build: .
    container_name: business-analysis
    ports:
      - "45679:45679"
    volumes:
      # Database persistence (mount to the path the code actually uses)
      - ./backend/business_data.db:/app/backend/business_data.db
      # Log persistence
      - ./backend/logs:/app/backend/logs
      # Target config (optional, read-only)
      - ./targets_import.json:/app/targets_import.json:ro
    environment:
      - APP_ENV=production
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN must be set for production}
    restart: unless-stopped
