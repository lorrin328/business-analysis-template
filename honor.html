<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星钻联盟荣誉体系</title>
  <script src="/js/api-client.js?v=1.0.106"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #091426;
      --panel: #18283e;
      --panel-2: #20334d;
      --line: #314964;
      --text: #f4f8ff;
      --muted: #9fb3cc;
      --blue: #4f8cff;
      --green: #25c285;
      --red: #ff6b6b;
      --gold: #f4b740;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 28px;
      background: #13243a;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 3;
    }
    main { padding: 24px; max-width: 1560px; margin: 0 auto; }
    a { color: #9fc2ff; text-decoration: none; }
    button, input, select {
      background: #243650;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      min-height: 36px;
    }
    button { cursor: pointer; }
    button.primary { background: var(--blue); border-color: var(--blue); color: white; font-weight: 600; }
    button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible {
      outline: 3px solid rgba(79,140,255,.55);
      outline-offset: 2px;
    }
    .page-title { font-size: 18px; font-weight: 700; }
    .version { color: var(--green); border: 1px solid rgba(37,194,133,.3); border-radius: 999px; padding: 2px 8px; font-size: 12px; margin-left: 10px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      background: rgba(24,40,62,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .toolbar label { color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .toolbar input { width: 92px; }
    .toolbar input[type="date"] { width: 150px; }
    .status-pill {
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
    }
    .metric-groups { display: grid; gap: 12px; margin-bottom: 18px; }
    .metric-group {
      background: rgba(16,28,46,.48);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .metric-group-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .metric-group-title { font-size: 14px; font-weight: 700; color: #dceaff; }
    .metric-group-note { font-size: 12px; color: var(--muted); }
    .metric-group-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; }
    .metric-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      min-height: 104px;
    }
    .metric-label { color: var(--muted); font-size: 13px; }
    .metric-value { font-size: 26px; font-weight: 700; margin-top: 8px; color: #8bb8ff; }
    .metric-note { color: var(--muted); margin-top: 8px; font-size: 12px; }
    .metric-card[data-tone="attention"] { border-color: rgba(238,90,90,.45); background: rgba(238,90,90,.06); }
    .metric-card[data-tone="attention"] .metric-value { color: #ff9a9a; }
    .metric-card[data-tone="result"] .metric-value { color: var(--gold); }
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .summary-note {
      background: rgba(32,51,77,.7);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--muted);
      line-height: 1.55;
    }
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .insight {
      background: rgba(16,28,46,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .insight span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .insight strong { color: #d9e8ff; font-size: 16px; }
    .summary-note strong { color: var(--text); }
    .tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--line); margin: 18px 0; overflow-x: auto; }
    .tab { width: auto; flex: 0 0 auto; padding: 11px 16px; border-radius: 6px 6px 0 0; color: #bcd3ef; cursor: pointer; white-space: nowrap; background: transparent; }
    .tab.active { background: var(--panel); color: #fff; font-weight: 600; }
    .panel {
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      overflow: auto;
    }
    .panel.active { display: block; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .panel-head h2, .panel-block h2, .panel-block h3 { margin: 0 0 8px; font-size: 16px; }
    .panel-head p, .panel-note { color: var(--muted); margin: 0 0 12px; line-height: 1.55; }
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .panel-block {
      background: rgba(13,24,41,.58);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .panel-block.wide { grid-column: span 2; }
    .detail-section { margin-top: 14px; }
    .split-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(320px, .6fr);
      gap: 14px;
      align-items: start;
    }
    .conclusion-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .conclusion-list div {
      background: rgba(32,51,77,.65);
      border: 1px solid rgba(49,73,100,.7);
      border-radius: 8px;
      padding: 12px;
    }
    .conclusion-list span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .conclusion-list strong { color: #dceaff; font-size: 17px; }
    .tracking-hero {
      display: grid;
      grid-template-columns: minmax(220px, .42fr) minmax(0, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }
    .tracking-total,
    .tracking-metrics div,
    .top-person {
      background: rgba(13,24,41,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .tracking-total span,
    .tracking-total em,
    .tracking-metrics span,
    .tracking-metrics em {
      color: var(--muted);
      font-style: normal;
    }
    .tracking-total strong {
      display: block;
      color: var(--gold);
      font-size: 52px;
      line-height: 1;
      margin: 12px 0 8px;
    }
    .tracking-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .tracking-metrics strong {
      display: inline-block;
      color: #dceaff;
      font-size: 26px;
      margin: 4px 5px 0 0;
    }
    .top-contributors { display: grid; gap: 10px; }
    .top-person {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar-mark {
      flex: 0 0 44px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(79,140,255,.92), rgba(37,194,133,.88));
      color: white;
      font-weight: 700;
    }
    .top-person-name { color: #dceaff; font-weight: 700; margin-bottom: 8px; }
    .top-person-stats { display: flex; gap: 16px; color: var(--muted); }
    .top-person-stats strong { color: var(--gold); font-size: 22px; margin-right: 3px; }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(13,24,41,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .filter-bar label { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); }
    .filter-bar input { min-width: 180px; }
    .filter-bar select { min-width: 120px; }
    .check-label input { width: auto; min-height: auto; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 8px; background: #101c2e; }
    table { width: 100%; border-collapse: collapse; min-width: 860px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid rgba(49,73,100,.8); text-align: left; white-space: nowrap; }
    th { color: #b8d4ff; background: #0d1829; position: sticky; top: 0; z-index: 1; font-weight: 600; }
    tr:hover td { background: rgba(79,140,255,.07); }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted); }
    .ok { color: var(--green); }
    .warn { color: var(--gold); }
    .bad { color: var(--red); }
    .empty { padding: 28px; text-align: center; color: var(--muted); }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(80px, 150px) 1fr 76px;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      color: #dceaff;
    }
    .bar-row span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-row strong { text-align: right; font-variant-numeric: tabular-nums; }
    .bar-track { height: 8px; background: rgba(79,140,255,.13); border-radius: 999px; overflow: hidden; }
    .bar-track i { display: block; height: 100%; background: linear-gradient(90deg, #4f8cff, #25c285); border-radius: inherit; }
    @media (max-width: 760px) {
      header { padding: 0 14px; align-items: flex-start; flex-direction: column; justify-content: center; padding-top: 10px; padding-bottom: 10px; }
      main { padding: 14px; }
      .toolbar { align-items: stretch; }
      button, input, select { width: 100%; }
      .toolbar label, .filter-bar label { width: 100%; }
      .filter-bar input, .filter-bar select { min-width: 0; }
      .metric-value { font-size: 22px; }
      .dashboard-grid, .split-layout, .tracking-hero { grid-template-columns: 1fr; }
      .tracking-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .panel-block.wide { grid-column: auto; }
      .panel-head { display: block; }
      .bar-row { grid-template-columns: 90px 1fr 64px; }
    }
  </style>
</head>
<body>
  <header>
    <div><span class="page-title">星钻联盟荣誉体系</span><span class="version">v1.0.106</span></div>
    <div><a href="/">返回经营看板</a></div>
  </header>
  <main>
    <div class="toolbar">
      <label>年份 <input id="honorYear" type="number" min="2020" max="2100" value="2026"></label>
      <label>月份 <input id="honorMonth" type="number" min="1" max="12" value="6"></label>
      <label>过程截至 <input id="honorAsOf" type="date"></label>
      <button id="auditBtn" data-permission="honor_audit">数据适配检查</button>
      <button id="recalcBtn" class="primary" data-permission="honor_recalculate">重新计算</button>
      <button id="exportBtn" data-permission="honor_export">导出Excel</button>
      <span id="honorStatus" class="status-pill">等待加载</span>
    </div>

    <section class="summary-strip">
      <div class="summary-note"><strong>适用范围：</strong>星钻仅覆盖 OTO、证保；经代和蚁桥（网服）不涉及星钻。</div>
      <div class="summary-note"><strong>团队口径：</strong>后续团队星钻只归集 OTO、证保；团队内网服/蚁桥人员及业绩均排除。</div>
      <div class="summary-note"><strong>数据来源：</strong>优先复用现有 performance 与 hr_data，不新增星钻专用上传。</div>
    </section>

    <section class="metric-groups" id="honorCards" aria-label="荣誉核心指标"></section>

    <nav class="tabs" role="tablist" aria-label="荣誉分析维度">
      <button type="button" class="tab active" id="tab-tracking" role="tab" aria-selected="true" aria-controls="tracking" data-tab="tracking">荣誉追踪</button>
      <button type="button" class="tab" id="tab-overview" role="tab" aria-selected="false" aria-controls="overview" data-tab="overview">总览驾驶舱</button>
      <button type="button" class="tab" id="tab-orgs" role="tab" aria-selected="false" aria-controls="orgs" data-tab="orgs">机构追踪</button>
      <button type="button" class="tab" id="tab-projects" role="tab" aria-selected="false" aria-controls="projects" data-tab="projects">项目分析</button>
      <button type="button" class="tab" id="tab-specialists" role="tab" aria-selected="false" aria-controls="specialists" data-tab="specialists">专员级</button>
      <button type="button" class="tab" id="tab-managers" role="tab" aria-selected="false" aria-controls="managers" data-tab="managers">管理职</button>
      <button type="button" class="tab" id="tab-warnings" role="tab" aria-selected="false" aria-controls="warnings" data-tab="warnings">月度预警</button>
      <button type="button" class="tab" id="tab-persons" role="tab" aria-selected="false" aria-controls="persons" data-tab="persons">人员明细</button>
      <button type="button" class="tab" id="tab-audit" role="tab" aria-selected="false" aria-controls="audit" data-tab="audit">数据审计</button>
    </nav>

    <section id="tracking" class="panel active" role="tabpanel" aria-labelledby="tab-tracking"><div class="empty">正在加载荣誉追踪结果...</div></section>
    <section id="overview" class="panel" role="tabpanel" aria-labelledby="tab-overview"><div class="empty">正在加载数据适配结果...</div></section>
    <section id="orgs" class="panel" role="tabpanel" aria-labelledby="tab-orgs"></section>
    <section id="projects" class="panel" role="tabpanel" aria-labelledby="tab-projects"></section>
    <section id="specialists" class="panel" role="tabpanel" aria-labelledby="tab-specialists"></section>
    <section id="managers" class="panel" role="tabpanel" aria-labelledby="tab-managers"></section>
    <section id="warnings" class="panel" role="tabpanel" aria-labelledby="tab-warnings"></section>
    <section id="persons" class="panel" role="tabpanel" aria-labelledby="tab-persons"></section>
    <section id="audit" class="panel" role="tabpanel" aria-labelledby="tab-audit"></section>
  </main>
  <script src="/js/honor.js?v=1.0.106"></script>
</body>
</html>
