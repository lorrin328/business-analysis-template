<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星钻联盟荣誉体系</title>
  <script src="/js/api-client.js?v=1.0.89"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #091426;
      --panel: #18283e;
      --panel-2: #20334d;
      --line: #314964;
      --text: #f4f8ff;
      --muted: #9fb3cc;
      --blue: #4f8cff;
      --green: #25c285;
      --red: #ff6b6b;
      --gold: #f4b740;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 28px;
      background: #13243a;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 3;
    }
    main { padding: 24px; max-width: 1560px; margin: 0 auto; }
    a { color: #9fc2ff; text-decoration: none; }
    button, input, select {
      background: #243650;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      min-height: 36px;
    }
    button { cursor: pointer; }
    button.primary { background: var(--blue); border-color: var(--blue); color: white; font-weight: 600; }
    .page-title { font-size: 18px; font-weight: 700; }
    .version { color: var(--green); border: 1px solid rgba(37,194,133,.3); border-radius: 999px; padding: 2px 8px; font-size: 12px; margin-left: 10px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      background: rgba(24,40,62,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .toolbar label { color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .toolbar input { width: 92px; }
    .status-pill {
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
    }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .metric-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      min-height: 104px;
    }
    .metric-label { color: var(--muted); font-size: 13px; }
    .metric-value { font-size: 26px; font-weight: 700; margin-top: 8px; color: #8bb8ff; }
    .metric-note { color: var(--muted); margin-top: 8px; font-size: 12px; }
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .summary-note {
      background: rgba(32,51,77,.7);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--muted);
      line-height: 1.55;
    }
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .insight {
      background: rgba(16,28,46,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .insight span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .insight strong { color: #d9e8ff; font-size: 16px; }
    .summary-note strong { color: var(--text); }
    .tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--line); margin: 18px 0; overflow-x: auto; }
    .tab { padding: 11px 16px; border-radius: 6px 6px 0 0; color: #bcd3ef; cursor: pointer; white-space: nowrap; }
    .tab.active { background: var(--panel); color: #fff; font-weight: 600; }
    .panel {
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      overflow: auto;
    }
    .panel.active { display: block; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .panel-head h2, .panel-block h2, .panel-block h3 { margin: 0 0 8px; font-size: 16px; }
    .panel-head p, .panel-note { color: var(--muted); margin: 0 0 12px; line-height: 1.55; }
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .panel-block {
      background: rgba(13,24,41,.58);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .panel-block.wide { grid-column: span 2; }
    .split-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(320px, .6fr);
      gap: 14px;
      align-items: start;
    }
    .conclusion-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .conclusion-list div {
      background: rgba(32,51,77,.65);
      border: 1px solid rgba(49,73,100,.7);
      border-radius: 8px;
      padding: 12px;
    }
    .conclusion-list span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .conclusion-list strong { color: #dceaff; font-size: 17px; }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(13,24,41,.72);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .filter-bar label { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); }
    .filter-bar input { min-width: 180px; }
    .filter-bar select { min-width: 120px; }
    .check-label input { width: auto; min-height: auto; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 8px; background: #101c2e; }
    table { width: 100%; border-collapse: collapse; min-width: 860px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid rgba(49,73,100,.8); text-align: left; white-space: nowrap; }
    th { color: #b8d4ff; background: #0d1829; position: sticky; top: 0; z-index: 1; font-weight: 600; }
    tr:hover td { background: rgba(79,140,255,.07); }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted); }
    .ok { color: var(--green); }
    .warn { color: var(--gold); }
    .bad { color: var(--red); }
    .empty { padding: 28px; text-align: center; color: var(--muted); }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(80px, 150px) 1fr 76px;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      color: #dceaff;
    }
    .bar-row span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-row strong { text-align: right; font-variant-numeric: tabular-nums; }
    .bar-track { height: 8px; background: rgba(79,140,255,.13); border-radius: 999px; overflow: hidden; }
    .bar-track i { display: block; height: 100%; background: linear-gradient(90deg, #4f8cff, #25c285); border-radius: inherit; }
    @media (max-width: 760px) {
      header { padding: 0 14px; align-items: flex-start; flex-direction: column; justify-content: center; padding-top: 10px; padding-bottom: 10px; }
      main { padding: 14px; }
      .toolbar { align-items: stretch; }
      button, input, select { width: 100%; }
      .toolbar label, .filter-bar label { width: 100%; }
      .filter-bar input, .filter-bar select { min-width: 0; }
      .metric-value { font-size: 22px; }
      .dashboard-grid, .split-layout { grid-template-columns: 1fr; }
      .panel-block.wide { grid-column: auto; }
      .panel-head { display: block; }
      .bar-row { grid-template-columns: 90px 1fr 64px; }
    }
  </style>
</head>
<body>
  <header>
    <div><span class="page-title">星钻联盟荣誉体系</span><span class="version">v1.0.89</span></div>
    <div><a href="/">返回经营看板</a></div>
  </header>
  <main>
    <div class="toolbar">
      <label>年份 <input id="honorYear" type="number" min="2020" max="2100" value="2026"></label>
      <label>月份 <input id="honorMonth" type="number" min="1" max="12" value="5"></label>
      <button id="auditBtn" data-permission="honor_audit">数据适配检查</button>
      <button id="recalcBtn" class="primary" data-permission="honor_recalculate">重新计算</button>
      <button id="exportBtn" data-permission="honor_export">导出Excel</button>
      <span id="honorStatus" class="status-pill">等待加载</span>
    </div>

    <section class="summary-strip">
      <div class="summary-note"><strong>适用范围：</strong>星钻仅覆盖 OTO、证保；经代和蚁桥（网服）不涉及星钻。</div>
      <div class="summary-note"><strong>团队口径：</strong>后续团队星钻只归集 OTO、证保；团队内网服/蚁桥人员及业绩均排除。</div>
      <div class="summary-note"><strong>数据来源：</strong>优先复用现有 performance 与 hr_data，不新增星钻专用上传。</div>
    </section>

    <section class="cards" id="honorCards"></section>

    <nav class="tabs">
      <div class="tab active" data-tab="overview">总览驾驶舱</div>
      <div class="tab" data-tab="orgs">机构追踪</div>
      <div class="tab" data-tab="projects">项目分析</div>
      <div class="tab" data-tab="specialists">专员级</div>
      <div class="tab" data-tab="managers">管理职</div>
      <div class="tab" data-tab="warnings">月度预警</div>
      <div class="tab" data-tab="persons">人员明细</div>
      <div class="tab" data-tab="audit">数据审计</div>
    </nav>

    <section id="overview" class="panel active"><div class="empty">正在加载数据适配结果...</div></section>
    <section id="orgs" class="panel"></section>
    <section id="projects" class="panel"></section>
    <section id="specialists" class="panel"></section>
    <section id="managers" class="panel"></section>
    <section id="warnings" class="panel"></section>
    <section id="persons" class="panel"></section>
    <section id="audit" class="panel"></section>
  </main>
  <script src="/js/honor.js?v=1.0.89"></script>
</body>
</html>
