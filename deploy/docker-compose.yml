services:
  app:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 45679"
    volumes:
      - ..:/app
    ports:
      - "45679:45679"
    environment:
      APP_ENV: production
    restart: unless-stopped
