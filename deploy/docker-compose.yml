services:
  app:
    image: python:3.12-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
    restart: unless-stopped
