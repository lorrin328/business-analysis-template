server {
    listen 80;
    server_name _;

    root /opt/business-analysis;
    index 经营分析模板.html;

    access_log /var/log/nginx/business-analysis.access.log;
    error_log /var/log/nginx/business-analysis.error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /经营分析模板.html;
    }
}
