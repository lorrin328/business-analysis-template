server {
    listen 80;
    server_name _;

    root /opt/business-analysis;
    index 经营分析模板.html;

    access_log /var/log/nginx/business-analysis.access.log;
    error_log /var/log/nginx/business-analysis.error.log;

    client_max_body_size 100m;

    # 仅开放业务页面与前端资源，禁止从站点根目录读取源码、配置、数据库和内部文档。
    location ~ ^/(?:\.git|\.github|backend|deploy|docs|tests)(?:/|$) {
        return 404;
    }

    location ~* \.(?:db|sqlite|sqlite3|xlsx|xls|csv|env|log|py|pyc|toml|lock|md|sh|service)$ {
        return 404;
    }

    location = /VERSION { return 404; }
    location = /targets_import.json { return 404; }

    location /api/ {
        proxy_pass http://127.0.0.1:45679;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /webhook/deploy {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /经营分析模板.html;
    }
}
