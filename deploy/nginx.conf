server {
    listen 80;
    server_name _;

    root /opt/business-analysis;
    index 经营分析模板.html;

    access_log /var/log/nginx/business-analysis.access.log;
    error_log /var/log/nginx/business-analysis.error.log;

    client_max_body_size 100m;

    location /api/ {
        proxy_pass http://127.0.0.1:45679;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 自动部署因 root 权限链整改暂停，不再对外暴露 webhook 入口。
    location = /webhook/deploy {
        return 404;
    }

    # 静态发布采用白名单，只开放业务页面与 js 资源。
    location = / {
        try_files /经营分析模板.html =404;
    }

    location = /经营分析模板.html {
        try_files /经营分析模板.html =404;
    }

    location = /honor {
        try_files /honor.html =404;
    }

    location = /honor.html {
        try_files /honor.html =404;
    }

    location = /scheme-calculator {
        try_files /scheme-calculator.html =404;
    }

    location = /scheme-calculator.html {
        try_files /scheme-calculator.html =404;
    }

    location = /personnel-management {
        try_files /personnel-management.html =404;
    }

    location = /personnel-management.html {
        try_files /personnel-management.html =404;
    }

    location = /market-analysis {
        try_files /market-analysis.html =404;
    }

    location = /market-analysis.html {
        try_files /market-analysis.html =404;
    }

    location ^~ /js/ {
        try_files $uri =404;
        add_header X-Content-Type-Options nosniff always;
    }

    location = /favicon.ico {
        return 204;
    }

    location / {
        return 404;
    }
}
