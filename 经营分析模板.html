<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经营分析 - 产品结构测算</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f0f2f5; color: #333; }

.header {
  background: linear-gradient(135deg, #1a3a6b 0%, #2d5f9a 100%);
  color: #fff; padding: 16px 32px; font-size: 20px; font-weight: 600;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
  display: flex; align-items: center; justify-content: space-between;
}
.header-actions { display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 400; }
.header-actions .meta-info { color: rgba(255,255,255,.8); }
.btn-reimport {
  background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3);
  padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
  transition: all .2s;
}
.btn-reimport:hover:not(:disabled) { background: rgba(255,255,255,.25); }
.btn-reimport:disabled { opacity: .5; cursor: not-allowed; }

.filters {
  background: #fff; margin: 16px; padding: 16px 20px; border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
}
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 12px; color: #888; font-weight: 500; }
.filter-group select, .filter-group input {
  height: 32px; border: 1px solid #d9d9d9; border-radius: 4px; padding: 0 8px;
  font-size: 13px; background: #fff; min-width: 100px;
}
.filter-group select:focus, .filter-group input:focus { border-color: #2d5f9a; outline: none; box-shadow: 0 0 0 2px rgba(45,95,154,.15); }

.btn-group { display: flex; gap: 0; }
.btn-group button {
  height: 32px; padding: 0 14px; border: 1px solid #d9d9d9; background: #fff;
  font-size: 13px; cursor: pointer; transition: all .2s;
}
.btn-group button:first-child { border-radius: 4px 0 0 4px; }
.btn-group button:last-child { border-radius: 0 4px 4px 0; }
.btn-group button + button { border-left: none; }
.btn-group button.active { background: #2d5f9a; color: #fff; border-color: #2d5f9a; }
.btn-group button:hover:not(.active) { background: #e8f0fe; }

.tabs { margin: 0 16px; display: flex; gap: 0; }
.tabs button {
  padding: 8px 20px; border: 1px solid #d9d9d9; background: #fff;
  font-size: 14px; cursor: pointer; transition: all .2s;
}
.tabs button:first-child { border-radius: 6px 0 0 6px; }
.tabs button:last-child { border-radius: 0 6px 6px 0; }
.tabs button + button { border-left: none; }
.tabs button.active { background: #2d5f9a; color: #fff; border-color: #2d5f9a; }

.charts-container { display: grid; gap: 16px; padding: 0 16px 16px; }
.chart-card {
  background: #fff; border-radius: 8px; padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.chart-card h3 { font-size: 15px; margin-bottom: 12px; color: #1a3a6b; }
.chart-box { width: 100%; height: 420px; }

.summary-cards { display: flex; gap: 16px; padding: 0 16px 16px; flex-wrap: wrap; }
.kpi-card {
  flex: 1; min-width: 180px; background: #fff; border-radius: 8px; padding: 16px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.kpi-card .kpi-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.kpi-card .kpi-value { font-size: 24px; font-weight: 700; color: #1a3a6b; }
.kpi-card .kpi-sub { font-size: 12px; margin-top: 4px; }
.kpi-sub.up { color: #52c41a; }
.kpi-sub.down { color: #f5222d; }

.compare-toggle { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.compare-toggle label { font-size: 13px; color: #555; }
.switch { position: relative; width: 40px; height: 22px; }
.switch input { opacity: 0; width: 0; height: 0; }
.switch .slider {
  position: absolute; inset: 0; background: #ccc; border-radius: 22px; cursor: pointer; transition: .3s;
}
.switch .slider:before {
  content: ''; position: absolute; height: 18px; width: 18px; left: 2px; bottom: 2px;
  background: #fff; border-radius: 50%; transition: .3s;
}
.switch input:checked + .slider { background: #2d5f9a; }
.switch input:checked + .slider:before { transform: translateX(18px); }

.daily-tip {
  position: fixed; display: none; background: #fff;
  border: 1px solid #d9d9d9; border-radius: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,.15);
  padding: 6px; z-index: 9999; width: 380px; height: 260px;
  pointer-events: none;
}

.boot-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,.96);
  display: flex; align-items: center; justify-content: center;
  z-index: 99999; flex-direction: column; gap: 16px;
  font-size: 14px; color: #2d5f9a;
}
.boot-overlay.error { color: #f5222d; }
.boot-overlay .spinner {
  width: 32px; height: 32px; border: 3px solid #d9e3f0;
  border-top-color: #2d5f9a; border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.boot-empty {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  padding: 40px; max-width: 560px; text-align: center;
}
.boot-empty h2 { font-size: 22px; color: #1a3a6b; font-weight: 600; }
.boot-empty p { color: #666; line-height: 1.6; font-size: 13px; }
.dropzone {
  border: 2px dashed #b3c5e0; border-radius: 12px; padding: 40px 60px;
  background: #f8fafe; cursor: pointer; transition: all .2s;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  min-width: 360px;
}
.dropzone:hover, .dropzone.dragover {
  border-color: #2d5f9a; background: #e8f0fe;
}
.dropzone .icon { font-size: 48px; }
.dropzone .label { font-size: 16px; font-weight: 600; color: #1a3a6b; }
.dropzone .hint { font-size: 12px; color: #999; }
.boot-cols-hint {
  background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px;
  padding: 10px 14px; font-size: 12px; color: #876800; line-height: 1.6;
  max-width: 520px; text-align: left;
}
.boot-cols-hint code { background: #fff; padding: 1px 4px; border-radius: 3px; font-size: 11px; }
.btn-retry {
  background: #2d5f9a; color: #fff; border: none; padding: 8px 20px;
  border-radius: 4px; cursor: pointer; font-size: 13px;
}
.btn-retry:hover { background: #1a3a6b; }
</style>
</head>
<body>

<div class="header">
  <span>经营分析 - 产品结构测算</span>
  <div class="header-actions">
    <span class="meta-info" id="metaInfo"></span>
    <button class="btn-reimport" id="btnReimport" disabled title="替换当前数据">📁 重新导入</button>
  </div>
</div>

<div class="filters">
  <div class="filter-group">
    <label>保费口径</label>
    <div class="btn-group" id="metricBtns">
      <button data-val="折算保费" class="active">折算保费</button>
      <button data-val="期交保费">期交保费</button>
      <button data-val="年化规保">规模保费</button>
    </div>
  </div>

  <div class="filter-group">
    <label>时间粒度</label>
    <div class="btn-group" id="granBtns">
      <button data-val="day" class="active">日累计</button>
      <button data-val="month">月度</button>
      <button data-val="quarter">季度</button>
    </div>
  </div>

  <div class="filter-group">
    <label>机构</label>
    <select id="selOrg"><option value="">全部机构</option></select>
  </div>

  <div class="filter-group">
    <label>业务模式</label>
    <select id="selMode"><option value="">全部模式</option></select>
  </div>

  <div class="filter-group">
    <label>长短险</label>
    <select id="selTerm"><option value="">全部</option></select>
  </div>

  <div class="filter-group">
    <label>是否商保年金</label>
    <select id="selAnnuity"><option value="">全部</option></select>
  </div>

  <div class="filter-group">
    <label>缴费年限</label>
    <select id="selPayYear"><option value="">全部</option></select>
  </div>

  <div class="filter-group">
    <label>保障年限</label>
    <select id="selCovYear"><option value="">全部</option></select>
  </div>

  <div class="filter-group">
    <label>产品设计分类</label>
    <select id="selDesign"><option value="">全部</option></select>
  </div>

  <div class="compare-toggle">
    <label>同比对比(2024)</label>
    <label class="switch">
      <input type="checkbox" id="compareToggle" checked>
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="tabs">
  <button data-view="overall" class="active">整体趋势</button>
  <button data-view="org">分机构对比</button>
  <button data-view="mode">分业务模式对比</button>
</div>

<div class="summary-cards" id="kpiArea"></div>

<div class="charts-container">
  <div class="chart-card">
    <h3 id="chartTitle">整体保费日累计趋势</h3>
    <div class="chart-box" id="mainChart"></div>
  </div>
  <div class="chart-card" id="yoyCard" style="display:none">
    <h3>同比增速 (%)</h3>
    <div class="chart-box" id="yoyChart"></div>
  </div>
  <div class="chart-card" id="structCard">
    <h3>产品结构占比</h3>
    <div class="chart-box" id="structChart"></div>
  </div>
</div>

<div class="daily-tip" id="dailyTip"></div>
<div class="boot-overlay" id="bootOverlay">
  <div id="bootLoading" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
    <div class="spinner"></div>
    <div id="bootMsg">正在初始化 ...</div>
  </div>
  <div id="bootEmpty" class="boot-empty" style="display:none;">
    <h2>📊 经营分析 - 产品结构测算</h2>
    <p>选择或拖入日明细 Excel 文件，浏览器内自动解析，数据保存在本机不上传。</p>
    <div class="dropzone" id="dropzone">
      <div class="icon">📂</div>
      <div class="label">选择 Excel 文件</div>
      <div class="hint">或拖拽 .xlsx 到这里</div>
    </div>
    <div class="boot-cols-hint">
      <b>源文件需包含的列：</b><br>
      时间：<code>日期</code>（或 <code>投保日期</code>/<code>签单日期</code>/<code>年月日</code>）、<code>年</code>、<code>月</code>（或 <code>年月</code>）、<code>季</code>（或 <code>年季</code>）、<code>月标签</code>（可选）<br>
      维度：<code>销售机构名称</code>、<code>业务模式</code>、<code>长短险</code>、<code>是否商保年金产品</code>、<code>缴费年限</code>、<code>保障年限</code>、<code>产品设计分类</code><br>
      指标：<code>期交保费</code>、<code>年化规保</code>、<code>折算保费</code>（单位元）
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.xlsm" style="display:none;">
  </div>
  <div id="bootError" style="display:none;flex-direction:column;align-items:center;gap:12px;max-width:600px;text-align:center;padding:20px;">
    <div style="font-size:32px;">⚠️</div>
    <div id="bootErrorMsg" style="color:#f5222d;white-space:pre-line;line-height:1.6;"></div>
    <button class="btn-retry" id="btnRetry">重试</button>
  </div>
</div>

<script>
(async function() {
  // --- Constants ---
  const BASE_YEAR = '2024';
  const MONTH_LABELS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const QUARTER_LABELS = ['Q1','Q2','Q3','Q4'];

  const FILTER_KEYS = [
    { key: '销售机构名称', sel: 'selOrg', col: 'org' },
    { key: '业务模式', sel: 'selMode', col: 'biz_mode' },
    { key: '长短险', sel: 'selTerm', col: 'term_type' },
    { key: '是否商保年金产品', sel: 'selAnnuity', col: 'is_annuity' },
    { key: '缴费年限', sel: 'selPayYear', col: 'pay_years' },
    { key: '保障年限', sel: 'selCovYear', col: 'cov_years' },
    { key: '产品设计分类', sel: 'selDesign', col: 'design_cat' }
  ];

  const METRIC_MAP = {
    '折算保费': 'zhsf_cents',
    '期交保费': 'qj_cents',
    '年化规保': 'ghgb_cents'
  };

  const VIEW_DIM_COL = { org: 'org', mode: 'biz_mode' };

  // --- State ---
  let state = {
    metric: '折算保费',
    gran: 'day',       // day | month | quarter （day 与 month 主图形态一致，仅文案差异保留）
    view: 'overall',
    compare: true
  };

  let db = null;
  const dailyCache = new Map();
  let mainChartInstance, yoyChartInstance, structChartInstance, miniChartInstance;
  let allYears = [];

  // --- SQL helpers ---
  function q(sql, params) {
    const stmt = db.prepare(sql);
    if (params) stmt.bind(params);
    const rows = [];
    while (stmt.step()) rows.push(stmt.getAsObject());
    stmt.free();
    return rows;
  }

  function metricCol() {
    return METRIC_MAP[state.metric];
  }

  function buildWhere(extraClauses, extraParams) {
    const clauses = [];
    const params = {};
    FILTER_KEYS.forEach(f => {
      const v = document.getElementById(f.sel).value;
      if (v) {
        clauses.push(`${f.col} = $${f.col}`);
        params['$' + f.col] = v;
      }
    });
    if (extraClauses && extraClauses.length) {
      extraClauses.forEach(c => clauses.push(c));
      Object.assign(params, extraParams || {});
    }
    return {
      where: clauses.length ? 'WHERE ' + clauses.join(' AND ') : '',
      params
    };
  }

  function filterStateHash() {
    return FILTER_KEYS.map(f => document.getElementById(f.sel).value).join('|') +
           '|' + state.metric + '|' + state.view;
  }

  // --- Init selects ---
  function initSelects() {
    FILTER_KEYS.forEach(f => {
      const rows = q(`SELECT DISTINCT ${f.col} AS v FROM fact_premium WHERE ${f.col} IS NOT NULL AND ${f.col} != '' ORDER BY ${f.col}`);
      const sel = document.getElementById(f.sel);
      const current = sel.value;
      sel.innerHTML = '<option value="">全部</option>';
      rows.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.v; opt.textContent = r.v;
        sel.appendChild(opt);
      });
      sel.value = current || '';
    });

    allYears = q(`SELECT DISTINCT year AS v FROM fact_premium ORDER BY year`).map(r => r.v);
  }

  // --- Aggregation via SQL ---
  function aggregate() {
    const view = state.view;
    const gran = state.gran;
    const periodCol = gran === 'quarter' ? 'quarter' : 'month';
    const dimCol = VIEW_DIM_COL[view] || null;
    const mc = metricCol();

    const { where, params } = buildWhere();
    const dimSelect = dimCol ? `, ${dimCol} AS dim_key` : `, '' AS dim_key`;
    const groupBy = dimCol ? `year, ${periodCol}, ${dimCol}` : `year, ${periodCol}`;

    const sql = `
      SELECT year, ${periodCol} AS period${dimSelect},
             SUM(${mc}) / 100.0 AS amount
      FROM fact_premium
      ${where}
      GROUP BY ${groupBy}
      ORDER BY year, period`;

    const rows = q(sql, params);

    // 组装为现 periodMap 形状：{ groupKey: { year, dimKey, periods, cumulative } }
    const periodMap = {};
    rows.forEach(r => {
      const dimKey = r.dim_key || '';
      const gkey = r.year + '||' + dimKey;
      if (!periodMap[gkey]) periodMap[gkey] = { year: r.year, dimKey, dimLabel: dimKey, periods: {} };
      periodMap[gkey].periods[r.period] = r.amount;
    });

    const maxPeriods = gran === 'quarter' ? 4 : 12;
    Object.values(periodMap).forEach(g => {
      g.cumulative = [];
      let cum = 0;
      for (let i = 1; i <= maxPeriods; i++) {
        cum += (g.periods[i] || 0);
        g.cumulative[i] = cum;
      }
    });

    return periodMap;
  }

  // --- Chart rendering ---
  function getXLabels() {
    return state.gran === 'quarter' ? QUARTER_LABELS : MONTH_LABELS;
  }

  function render() {
    dailyCache.clear();
    const periodMap = aggregate();
    const xLabels = getXLabels();
    const maxPeriods = xLabels.length;

    const yearsSet = new Set();
    Object.values(periodMap).forEach(g => yearsSet.add(g.year));
    const years = [...yearsSet].sort();

    const dimKeysSet = new Set();
    Object.values(periodMap).forEach(g => { if (g.dimKey) dimKeysSet.add(g.dimKey); });
    const dimKeys = [...dimKeysSet].sort();

    const colors = ['#2d5f9a','#e8963e','#52c41a','#722ed1','#eb2f96','#13c2c2','#faad14','#f5222d','#2f54eb','#fa541c','#a0d911'];
    const yearColors = {};
    years.forEach((y, i) => { yearColors[y] = colors[i % colors.length]; });

    const series = [];

    if (state.view === 'overall') {
      years.forEach(year => {
        const g = Object.values(periodMap).find(x => x.year === year && !x.dimKey);
        if (!g) return;
        const isBase = year === BASE_YEAR;
        series.push({
          name: year,
          type: 'line',
          data: Array.from({length: maxPeriods}, (_, i) => Math.round((g.cumulative[i + 1] || 0) * 100) / 100),
          smooth: true,
          symbolSize: 6,
          lineStyle: { width: 2.5, type: isBase && state.compare ? 'dashed' : 'solid' },
          itemStyle: { color: yearColors[year] },
          emphasis: { lineStyle: { width: 4 } }
        });
      });
    } else {
      years.forEach(year => {
        dimKeys.forEach(dimKey => {
          const g = Object.values(periodMap).find(x => x.year === year && x.dimKey === dimKey);
          if (!g) return;
          const isBase = year === BASE_YEAR;
          series.push({
            name: year + ' - ' + dimKey,
            type: 'line',
            data: Array.from({length: maxPeriods}, (_, i) => Math.round((g.cumulative[i + 1] || 0) * 100) / 100),
            smooth: true,
            symbolSize: 5,
            lineStyle: { width: 2, type: isBase && state.compare ? 'dashed' : 'solid' },
            itemStyle: { color: yearColors[year] },
            emphasis: { lineStyle: { width: 3 } }
          });
        });
      });
    }

    const granLabels = { day: '日累计', month: '月度', quarter: '季度' };
    const viewLabels = { overall: '整体', org: '分机构', mode: '分业务模式' };
    document.getElementById('chartTitle').textContent =
      `${viewLabels[state.view]}${granLabels[state.gran]}保费趋势 - ${state.metric}（hover 查看日明细）`;

    try {
      if (!mainChartInstance) {
        mainChartInstance = echarts.init(document.getElementById('mainChart'));
        installDailyTooltip();
      }
      mainChartInstance.setOption({
        tooltip: { show: false },
        legend: { top: 0, type: 'scroll', textStyle: { fontSize: 12 } },
        grid: { top: 40, left: 70, right: 20, bottom: 30 },
        xAxis: {
          type: 'category',
          data: xLabels,
          axisLabel: { fontSize: 12 },
          boundaryGap: false
        },
        yAxis: { type: 'value', axisLabel: { formatter: v => formatShort(v) } },
        series: series.length ? series : [{ name: '', type: 'line', data: [] }],
        animation: true
      }, true);
    } catch (e) {
      console.error('主图渲染失败:', e);
      throw new Error('主图渲染失败: ' + (e.message || String(e)));
    }

    const yoyCard = document.getElementById('yoyCard');
    if (state.compare) {
      yoyCard.style.display = '';
      try { renderYoY(periodMap, xLabels, years, dimKeys); }
      catch (e) { console.error('同比图渲染失败:', e); }
    } else {
      yoyCard.style.display = 'none';
    }

    try { renderStructure(); }
    catch (e) { console.error('结构图渲染失败:', e); }

    try { renderKPI(periodMap, years, dimKeys, xLabels); }
    catch (e) { console.error('KPI 渲染失败:', e); }
  }

  function renderYoY(periodMap, xLabels, years, dimKeys) {
    const maxPeriods = xLabels.length;
    const yoySeries = [];
    const yoyColors = ['#e8963e','#52c41a','#722ed1','#eb2f96','#13c2c2','#faad14'];

    if (state.view === 'overall') {
      const baseG = Object.values(periodMap).find(x => x.year === BASE_YEAR && !x.dimKey);
      if (!baseG) { if (yoyChartInstance) yoyChartInstance.clear(); return; }

      years.filter(y => y !== BASE_YEAR).forEach((year, ci) => {
        const g = Object.values(periodMap).find(x => x.year === year && !x.dimKey);
        if (!g) return;
        yoySeries.push({
          name: year,
          type: 'line',
          data: Array.from({length: maxPeriods}, (_, i) => {
            const cur = g.cumulative[i + 1] || 0;
            const base = baseG.cumulative[i + 1] || 0;
            if (base === 0) return null;
            return Math.round(((cur - base) / base) * 10000) / 100;
          }),
          smooth: true,
          symbolSize: 6,
          lineStyle: { width: 2 },
          itemStyle: { color: yoyColors[ci % yoyColors.length] }
        });
      });
    } else {
      years.filter(y => y !== BASE_YEAR).forEach(year => {
        dimKeys.forEach(dimKey => {
          const g = Object.values(periodMap).find(x => x.year === year && x.dimKey === dimKey);
          const baseG = Object.values(periodMap).find(x => x.year === BASE_YEAR && x.dimKey === dimKey);
          if (!g || !baseG) return;
          yoySeries.push({
            name: year + ' - ' + dimKey,
            type: 'line',
            data: Array.from({length: maxPeriods}, (_, i) => {
              const cur = g.cumulative[i + 1] || 0;
              const base = baseG.cumulative[i + 1] || 0;
              if (base === 0) return null;
              return Math.round(((cur - base) / base) * 10000) / 100;
            }),
            smooth: true,
            symbolSize: 5,
            lineStyle: { width: 2 },
            itemStyle: { color: yoyColors[yoySeries.length % yoyColors.length] }
          });
        });

  function renderKPI(periodMap, years, dimKeys, xLabels) {
    const kpiArea = document.getElementById('kpiArea');
    const maxPeriods = xLabels.length;
    const yearLatest = {};

    Object.values(periodMap).forEach(g => {
      let lastPeriod = 0;
      for (let i = maxPeriods; i >= 1; i--) {
        // 取最后非零期（含负数）
        if ((g.periods[i] || 0) !== 0 || (g.cumulative[i] || 0) !== 0) { lastPeriod = i; break; }
      }
      if (lastPeriod === 0) return;

      const label = g.year + (g.dimKey ? ' - ' + g.dimKey : '');
      yearLatest[label] = {
        year: g.year,
        dimKey: g.dimKey,
        val: g.cumulative[lastPeriod] || 0,
        time: xLabels[lastPeriod - 1]
      };
    });

    let html = '';
    const sorted = Object.values(yearLatest).sort((a, b) => b.val - a.val);
    sorted.slice(0, 6).forEach(item => {
      const base = yearLatest[BASE_YEAR + (item.dimKey ? ' - ' + item.dimKey : '')];
      let subHtml = '';
      if (base && item.year !== BASE_YEAR && state.compare) {
        const pct = base.val !== 0 ? ((item.val - base.val) / Math.abs(base.val) * 100).toFixed(1) : '-';
        const cls = parseFloat(pct) >= 0 ? 'up' : 'down';
        subHtml = '<div class="kpi-sub ' + cls + '">同比 ' + (parseFloat(pct) >= 0 ? '+' : '') + pct + '%</div>';
      }
      const label = item.year + (item.dimKey ? ' - ' + item.dimKey : '');
      html += '<div class="kpi-card">' +
        '<div class="kpi-label">' + label + ' (截至 ' + item.time + ')</div>' +
        '<div class="kpi-value">' + formatNum(item.val) + '</div>' +
        subHtml + '</div>';
    });
    kpiArea.innerHTML = html;
  }

  function queryDaily(year, period) {
    const periodWhereCol = state.gran === 'quarter' ? 'quarter' : 'month';
    const { where, params } = buildWhere(
      [`year = $y`, `${periodWhereCol} = $p`, `day IS NOT NULL`],
      { $y: year, $p: period }
    );
    const sql = `
      SELECT day, SUM(${metricCol()}) / 100.0 AS amount
      FROM fact_premium
      ${where}
      GROUP BY day
      ORDER BY day`;
    return q(sql, params);
  }

    if (n == null) return '-';
    if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(2) + '亿';
    if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(2) + '万';
    return n.toFixed(2);
  }

  function formatShort(n) {
    if (n == null) return '-';

    if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(0) + '万';
    return n.toFixed(0);
  }

  // --- IndexedDB wrapper ---
  const IDB_NAME = 'business-analysis-template';
  const IDB_STORE = 'kv';
  const IDB_VER = 1;

  function openIdb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(IDB_NAME, IDB_VER);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function idbGet(key) {
    const db = await openIdb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function idbPut(key, val) {
    const db = await openIdb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(val, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  // --- Excel parsing & DB build ---
  const REQUIRED_TIME_COLS = ['年', '月', '季'];
  const DATE_COL_CANDIDATES = ['日期', '投保日期', '签单日期', '成交日期', '年月日'];
  // 核心维度：新表必须包含
  const CORE_DIM_COLS = [
    '销售机构名称', '业务模式', '长短险', '是否商保年金产品',
    '缴费年限', '保障年限', '产品设计分类'
  ];

  const EXT_DIM_COLS = [
    '人员工号', '主管工号', '经理工号', '投保单号', '自保件标记',
    '投保时间', '承保时间', '入账时间', '回销时间',
    '产品代码', '产品名称', '是否个人养老金'
  ];
  const ALL_DIM_COLS = [...CORE_DIM_COLS, ...EXT_DIM_COLS];
  const METRIC_COLS_ZH = ['期交保费', '年化规保', '折算保费', '价值规保'];
  const COL_ALIASES = {
    '月': ['年月'],
    '季': ['年季'],
    '日期': ['年月日']
  };
  function resolveCol(standard, available) {
    if (available.includes(standard)) return standard;
    const aliases = COL_ALIASES[standard];
    if (aliases) {
      for (const a of aliases) { if (available.includes(a)) return a; }
    }
    return null;
  }

  const SCHEMA_SQL = `
    CREATE TABLE fact_premium (
      id INTEGER PRIMARY KEY,
      date TEXT, year TEXT NOT NULL, quarter INTEGER NOT NULL, month INTEGER NOT NULL,
      day INTEGER, month_label TEXT NOT NULL,
      org TEXT, biz_mode TEXT, is_operating TEXT, is_dividend TEXT, innovate TEXT,
      term_type TEXT, is_annuity TEXT, pay_years TEXT, cov_years TEXT, design_cat TEXT,
      staff_id TEXT, supervisor_id TEXT, manager_id TEXT, policy_no TEXT, self_mark TEXT,
      app_date TEXT, underwrite_date TEXT, entry_date TEXT, cancel_date TEXT,
      product_code TEXT, product_name TEXT, is_pension TEXT,
      qj_cents INTEGER NOT NULL DEFAULT 0,
      ghgb_cents INTEGER NOT NULL DEFAULT 0,
      zhsf_cents INTEGER NOT NULL DEFAULT 0,
      jzgb_cents INTEGER NOT NULL DEFAULT 0
    );
    CREATE INDEX ix_ym   ON fact_premium(year, month);
    CREATE INDEX ix_yq   ON fact_premium(year, quarter);
    CREATE INDEX ix_ymd  ON fact_premium(year, month, day);
    CREATE INDEX ix_org  ON fact_premium(org);
    CREATE INDEX ix_mode ON fact_premium(biz_mode);
    CREATE INDEX ix_dsg  ON fact_premium(design_cat);
  `;
  const INSERT_SQL = `INSERT INTO fact_premium
    (date, year, quarter, month, day, month_label, org, biz_mode, is_operating,
     is_dividend, innovate, term_type, is_annuity, pay_years, cov_years, design_cat,
     staff_id, supervisor_id, manager_id, policy_no, self_mark,
     app_date, underwrite_date, entry_date, cancel_date,
     product_code, product_name, is_pension,
     qj_cents, ghgb_cents, zhsf_cents, jzgb_cents)
    VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)`;

  function levenshtein(a, b) {
    const m = a.length, n = b.length;
    if (!m) return n; if (!n) return m;
    const prev = Array(n + 1).fill(0).map((_, i) => i);
    for (let i = 1; i <= m; i++) {
      let cur = [i];
      for (let j = 1; j <= n; j++) {
        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
        cur[j] = Math.min(cur[j - 1] + 1, prev[j] + 1, prev[j - 1] + cost);
      }
      for (let j = 0; j <= n; j++) prev[j] = cur[j];
    }
    return prev[n];
  }
  function suggest(target, candidates, n = 3) {
    return candidates
      .map(c => ({ c, d: levenshtein(target, c) }))
      .sort((a, b) => a.d - b.d)
      .slice(0, n)
      .filter(x => x.d <= Math.max(2, Math.ceil(target.length * 0.5)))
      .map(x => x.c);
  }

  function validateColumns(allCols) {
    const required = [...REQUIRED_TIME_COLS, ...CORE_DIM_COLS, ...METRIC_COLS_ZH];
    const missing = required.filter(c => !resolveCol(c, allCols));
    if (missing.length === 0) return;
    const lines = ['源文件缺失以下必要列：'];
    missing.forEach(col => {
      const sug = suggest(col, allCols);
      lines.push(`  • ${col}    最相近：${sug.length ? sug.join(', ') : '无'}`);
    });
    lines.push(`\n实际列名共 ${allCols.length} 列。`);
    throw new Error(lines.join('\n'));
  }

  function findDateColumn(allCols) {
    for (const c of DATE_COL_CANDIDATES) {
      if (allCols.includes(c)) return c;
      const alias = resolveCol(c, allCols);
      if (alias) return alias;
    }
    return null;
  }

  function toCents(v) {
    if (v == null || v === '') return 0;
    const s = String(v).replace(/,/g, '').trim();
    const n = parseFloat(s);
    if (!isFinite(n)) return 0;
    return Math.round(n * 100);
  }
  function trimDim(v) {
    if (v == null) return '未知';
    const s = String(v).trim();
    if (!s || s === 'nan' || s === 'None') return '未知';
    return s;
  }
  function trimEmpty(v) {
    if (v == null) return '';
    const s = String(v).trim();
    if (!s || s === 'nan' || s === 'None') return '';
    return s;
  }
  function fmtDateTime(v) {
    if (v == null || v === '') return null;
    if (v instanceof Date && !isNaN(v)) {
      return `${v.getFullYear()}-${pad2(v.getMonth()+1)}-${pad2(v.getDate())} ${pad2(v.getHours())}:${pad2(v.getMinutes())}:${pad2(v.getSeconds())}`;
    }
    const s = String(v).trim();
    if (!s) return null;
    return s;
  }
  function pad2(n) { return n < 10 ? '0' + n : '' + n; }
  function parseDateCell(v) {
    if (v == null || v === '') return { date: null, day: null };
    if (v instanceof Date && !isNaN(v)) {
      return { date: `${v.getFullYear()}-${pad2(v.getMonth() + 1)}-${pad2(v.getDate())}`, day: v.getDate() };
    }
    if (typeof v === 'number') {
      const d = XLSX.SSF.parse_date_code(v);
      if (d) return { date: `${d.y}-${pad2(d.m)}-${pad2(d.d)}`, day: d.d };
      return { date: null, day: null };
    }
    const s = String(v).trim();
    const m = s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
    if (m) {
      return { date: `${m[1]}-${pad2(+m[2])}-${pad2(+m[3])}`, day: +m[3] };
    }
    const dt = new Date(s);
    if (!isNaN(dt)) {
      return { date: `${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())}`, day: dt.getDate() };
    }
    return { date: null, day: null };
  }

  function transformRow(r, dateCol, colMap) {
    const get = (std) => {
      const key = colMap?.[std] || std;
      return r[key];
    };
    const dateInfo = dateCol ? parseDateCell(r[dateCol]) : { date: null, day: null };
    const year = (get('年') == null ? '' : String(get('年')).trim());

    // 月：支持整数或 Date（如 2024-01-01 表示 1 月）
    let monthRaw = get('月');
    let month = 0;
    if (monthRaw instanceof Date && !isNaN(monthRaw)) {
      month = monthRaw.getMonth() + 1;
    } else {
      month = parseInt(monthRaw, 10) || 0;
    }

    // 季：支持整数或字符串如 '2024-1'
    let quarterRaw = get('季');
    let quarter = 0;
    if (typeof quarterRaw === 'string' && quarterRaw.includes('-')) {
      const parts = quarterRaw.split('-');
      quarter = parseInt(parts[parts.length - 1], 10) || 0;
    } else {
      quarter = parseInt(quarterRaw, 10) || 0;
    }

    // 月标签：缺失时自动衍生
    let monthLabelRaw = get('月标签');
    let monthLabel = '';
    if (monthLabelRaw == null) {
      monthLabel = year && month ? `${year}年${month}月` : '';
    } else {
      monthLabel = String(monthLabelRaw).trim();
    }

    return [
      dateInfo.date, year, quarter, month, dateInfo.day, monthLabel,
      trimDim(get('销售机构名称')), trimDim(get('业务模式')), '未知',
      '未知', '未知', trimDim(get('长短险')),
      trimDim(get('是否商保年金产品')), trimDim(get('缴费年限')), trimDim(get('保障年限')),
      trimDim(get('产品设计分类')),
      trimEmpty(get('人员工号')), trimEmpty(get('主管工号')), trimEmpty(get('经理工号')),
      trimEmpty(get('投保单号')), trimEmpty(get('自保件标记')),
      fmtDateTime(get('投保时间')), fmtDateTime(get('承保时间')),
      fmtDateTime(get('入账时间')), fmtDateTime(get('回销时间')),
      trimEmpty(get('产品代码')), trimEmpty(get('产品名称')), trimEmpty(get('是否个人养老金')),
      toCents(get('期交保费')), toCents(get('年化规保')), toCents(get('折算保费')), toCents(get('价值规保'))
    ];
  }

  async function parseAndBuild(file) {
    setBoot('loading', `正在读取 ${file.name} ...`);
    const buf = await file.arrayBuffer();
    setBoot('loading', '正在解析 Excel（大文件可能需要 5-30 秒）...');
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    if (!sheet) throw new Error('Excel 文件为空（无 sheet）');
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: null, raw: true });
    if (!rows.length) throw new Error('Excel 第一个 sheet 没有数据行');

    const allCols = Object.keys(rows[0]);
    validateColumns(allCols);
    const dateCol = findDateColumn(allCols);

    // 建立标准列名 → 实际列名 的映射（支持别名，含新旧表全部可选字段）
    const colMap = {};
    for (const col of [...REQUIRED_TIME_COLS, ...ALL_DIM_COLS, ...METRIC_COLS_ZH]) {
      const resolved = resolveCol(col, allCols);
      if (resolved) colMap[col] = resolved;
    }

    setBoot('loading', `正在构建数据库（${rows.length.toLocaleString()} 行）...`);
    const newDb = new window.__SQL.Database();
    newDb.exec(SCHEMA_SQL);

    const stmt = newDb.prepare(INSERT_SQL);
    newDb.exec('BEGIN');
    let bad = 0;
    for (const r of rows) {
      try { stmt.run(transformRow(r, dateCol, colMap)); }
      catch (e) { bad++; }
    }
    newDb.exec('COMMIT');
    stmt.free();
    newDb.exec('ANALYZE');

    if (bad > 0) console.warn(`${bad} 行写入失败（已跳过）`);
    return { newDb, fileName: file.name };
  }

  function collectMeta(targetDb, fileName) {
    const totalRow = targetDb.exec('SELECT COUNT(*) AS c FROM fact_premium');
    const total = totalRow[0]?.values[0][0] || 0;
    const yearRows = targetDb.exec('SELECT year, COUNT(*) AS c FROM fact_premium GROUP BY year ORDER BY year');
    const byYear = {};
    if (yearRows[0]) yearRows[0].values.forEach(([y, c]) => { byYear[y] = c; });
    const sumRow = targetDb.exec(
      'SELECT SUM(qj_cents)/100.0, SUM(ghgb_cents)/100.0, SUM(zhsf_cents)/100.0, SUM(jzgb_cents)/100.0 FROM fact_premium'
    );
    const sums = sumRow[0]?.values[0] || [0, 0, 0, 0];
    return {
      importedAt: new Date().toISOString(),
      fileName,
      rowCount: total,
      byYear,
      sumQj: sums[0], sumGhgb: sums[1], sumZhsf: sums[2], sumJzgb: sums[3]
    };
  }

  function updateMetaInfo(meta) {
    if (!meta) { document.getElementById('metaInfo').textContent = ''; return; }
    const dt = new Date(meta.importedAt);
    const dtStr = `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())} ${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`;
    document.getElementById('metaInfo').textContent =
      `${meta.rowCount.toLocaleString()} 行 · 导入于 ${dtStr}`;
  }

  function initApp(meta) {
    initSelects();
    bindEvents();
    bindReimport();
    try {
      render();
    } catch (e) {
      console.error('渲染失败:', e);
      setBoot('error', '图表渲染失败：' + (e.message || String(e)) + '\n请打开浏览器控制台（F12）查看详细错误。');
      return;
    }
    updateMetaInfo(meta);
    document.getElementById('btnReimport').disabled = false;
    hideBoot();
  }

  async function handleImport(file) {
    try {
      const { newDb, fileName } = await parseAndBuild(file);
      setBoot('loading', '正在保存到浏览器缓存 ...');
      const exported = newDb.export();
      await idbPut('db', exported);
      const meta = collectMeta(newDb, fileName);
      await idbPut('meta', meta);

      if (db) { try { db.close(); } catch(e) {} }
      db = newDb;
      dailyCache.clear();

      console.log('✅ 导入成功', meta);
      if (mainChartInstance) {
        // 已有图表实例：复用，仅刷新数据
        initSelects();
        updateMetaInfo(meta);
        try {
          render();
          hideBoot();
        } catch (e) {
          console.error('渲染失败:', e);
          setBoot('error', '图表渲染失败：' + (e.message || String(e)) + '\n请打开浏览器控制台（F12）查看详细错误。');
        }
      } else {
        initApp(meta);
      }
    } catch (e) {
      console.error(e);
      setBoot('error', e.message || String(e));
    }
  }

  function bindReimport() {
    const btn = document.getElementById('btnReimport');
    btn.onclick = () => {
      if (!confirm('确定要替换当前数据吗？这将清除浏览器中已保存的数据。')) return;
      const inp = document.createElement('input');
      inp.type = 'file';
      inp.accept = '.xlsx,.xls,.xlsm';
      inp.onchange = () => { if (inp.files[0]) handleImport(inp.files[0]); };
      inp.click();
    };
  }

  function bindEmptyUI() {
    const dz = document.getElementById('dropzone');
    const fi = document.getElementById('fileInput');
    dz.onclick = () => fi.click();
    fi.onchange = () => { if (fi.files[0]) handleImport(fi.files[0]); };
    dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('dragover'); };
    dz.ondragleave = () => dz.classList.remove('dragover');
    dz.ondrop = (e) => {
      e.preventDefault();
      dz.classList.remove('dragover');
      const f = e.dataTransfer.files[0];
      if (f) handleImport(f);
    };
    document.getElementById('btnRetry').onclick = () => bootFlow();
  }

  async function bootFlow() {
    try {
      setBoot('loading', '正在加载 SQLite 引擎 ...');
      if (!window.__SQL) {
        window.__SQL = await initSqlJs({
          locateFile: f => `https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/${f}`
        });
      }

      setBoot('loading', '正在检查浏览器缓存 ...');
      const cached = await idbGet('db');
      if (cached) {
        db = new window.__SQL.Database(new Uint8Array(cached));
        const meta = await idbGet('meta');
        initApp(meta);
        return;
      }

      setBoot('empty');
      bindEmptyUI();
    } catch (e) {
      console.error(e);
      setBoot('error', e.message || String(e));
    }
  }

  bootFlow();
})();
</script>
